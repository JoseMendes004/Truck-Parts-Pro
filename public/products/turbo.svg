<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- Turbo housing (snail shape approximation) -->
  <circle cx="200" cy="190" r="120" fill="#c0c9d4" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="200" cy="190" r="80" fill="#94a3b8" stroke="#64748b" stroke-width="3"/>
  <circle cx="200" cy="190" r="45" fill="#64748b" stroke="#475569" stroke-width="3"/>
  <!-- Impeller blades -->
  <path d="M200 145 L220 170 L200 190 Z" fill="#334155"/>
  <path d="M245 165 L225 185 L200 190 Z" fill="#334155"/>
  <path d="M245 215 L220 205 L200 190 Z" fill="#334155"/>
  <path d="M200 235 L185 210 L200 190 Z" fill="#334155"/>
  <path d="M155 215 L180 200 L200 190 Z" fill="#334155"/>
  <path d="M155 165 L180 175 L200 190 Z" fill="#334155"/>
  <!-- Center shaft -->
  <circle cx="200" cy="190" r="20" fill="#1e293b"/>
  <!-- Inlet/outlet pipes -->
  <rect x="310" y="165" width="50" height="50" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <rect x="180" y="40" width="40" height="50" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#475569" font-weight="600">Turbo Garrett</text>
</svg>
