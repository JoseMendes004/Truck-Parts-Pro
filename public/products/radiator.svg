<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#f0f4f8"/>
  <!-- Radiator body -->
  <rect x="60" y="80" width="280" height="240" rx="8" fill="#cbd5e1" stroke="#94a3b8" stroke-width="3"/>
  <!-- Radiator fins -->
  <line x1="100" y1="80" x2="100" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="130" y1="80" x2="130" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="160" y1="80" x2="160" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="190" y1="80" x2="190" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="220" y1="80" x2="220" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="250" y1="80" x2="250" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="280" y1="80" x2="280" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <line x1="310" y1="80" x2="310" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <!-- Tanks -->
  <rect x="40" y="90" width="30" height="220" rx="6" fill="#64748b" stroke="#475569" stroke-width="2"/>
  <rect x="330" y="90" width="30" height="220" rx="6" fill="#64748b" stroke="#475569" stroke-width="2"/>
  <!-- Hose ports -->
  <circle cx="55" cy="120" r="10" fill="#334155" stroke="#1e293b" stroke-width="2"/>
  <circle cx="55" cy="280" r="10" fill="#334155" stroke="#1e293b" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#475569" font-weight="600">Radiador Valeo</text>
</svg>
